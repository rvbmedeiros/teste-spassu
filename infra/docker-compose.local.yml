# ─── Infraestrutura local para desenvolvimento ────────────────────────────────
#
# Sobe apenas os middlewares necessários para rodar os serviços Spring Boot e
# o frontend localmente (fora do Docker).
#
# Uso:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down
#
# Após subir, os serviços ficam disponíveis em:
#   Vault      → http://localhost:8200  (token: ver .env → VAULT_TOKEN)
#   Keycloak   → http://localhost:8080  (admin: ver .env → KEYCLOAK_ADMIN_*)
#   RabbitMQ   → amqp://localhost:5672  | management: http://localhost:15672
#   PostgreSQL → localhost:5432         (usado internamente pelo Keycloak)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Vault (modo dev) ────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    container_name: spassu-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: spassu-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vault Init (semeia secrets; re-semeia automaticamente se o Vault reiniciar)
  vault-init:
    image: hashicorp/vault:latest
    container_name: spassu-vault-init
    restart: always
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: spassu-dev-token
      POSTGRES_DB: spassu
      POSTGRES_USER: spassu
      POSTGRES_PASSWORD: spassu
      RABBITMQ_USER: spassu
      RABBITMQ_PASSWORD: spassu
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/master
      BFF_ORIGIN: http://localhost:8083
      FRONTEND_ORIGIN: http://localhost:3000
    volumes:
      - ./vault/vault-init-local.sh:/vault-init.sh:ro
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          if vault status > /dev/null 2>&1; then
            vault kv get secret/application > /dev/null 2>&1 || sh /vault-init.sh
          fi
          sleep 15
        done
    depends_on:
      vault:
        condition: service_healthy

  # ── PostgreSQL (usado pelo Keycloak) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: spassu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spassu
      POSTGRES_USER: spassu
      POSTGRES_PASSWORD: spassu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spassu -d spassu"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak 26.5.1 ─────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: spassu-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/spassu
      KC_DB_USERNAME: spassu
      KC_DB_PASSWORD: spassu
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── RabbitMQ 4 ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: spassu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: spassu
      RABBITMQ_DEFAULT_PASS: spassu
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
