services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  vault:
    image: hashicorp/vault:latest
    container_name: spassu-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./infra/vault/vault-init.sh:/vault-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:latest
    container_name: spassu-vault-init
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      BFF_ORIGIN: ${BFF_ORIGIN}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    volumes:
      - ./infra/vault/vault-init.sh:/vault-init.sh:ro
    entrypoint:
      - sh
      - -c
      - |
        until vault status > /dev/null 2>&1; do
          sleep 2
        done
        sh /vault-init.sh
    depends_on:
      vault:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    container_name: spassu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-view-init:
    image: postgres:16-alpine
    container_name: spassu-postgres-view-init
    restart: on-failure
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAX_ATTEMPTS: 120
      SLEEP_SECONDS: 2
    volumes:
      - ./infra/postgres/init-relatorio-view.sh:/scripts/init-relatorio-view.sh:ro
      - ./infra/postgres/init-relatorio-view.sql:/scripts/init-relatorio-view.sql:ro
    entrypoint: ["sh", "/scripts/init-relatorio-view.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      microservice:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: spassu-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200' <&3\""]
      start_period: 90s
      interval: 30s
      timeout: 10s
      retries: 10

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: spassu-keycloak-init
    restart: "no"
    entrypoint: ["sh", "/keycloak-init.sh"]
    environment:
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      BFF_CLIENT_SECRET: spassu-bff-secret-2026
    volumes:
      - ./infra/keycloak/keycloak-init.sh:/keycloak-init.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: spassu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Application Services ──────────────────────────────────────────────────
  microservice:
    build:
      context: .
      dockerfile: microservice/Dockerfile
    container_name: spassu-microservice
    restart: unless-stopped
    environment:
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    ports:
      - "8081:8081"
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  orchestration:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: spassu-orchestration
    restart: unless-stopped
    environment:
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    ports:
      - "8082:8082"
    depends_on:
      vault-init:
        condition: service_completed_successfully
      microservice:
        condition: service_healthy
      postgres-view-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    container_name: spassu-bff
    restart: unless-stopped
    environment:
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    ports:
      - "8083:8083"
    depends_on:
      vault-init:
        condition: service_completed_successfully
      orchestration:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    container_name: spassu-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
  vault-data:
